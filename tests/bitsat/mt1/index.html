<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f0f2f5; height: 100vh; overflow: hidden; }
        
        #instruction-page, #exam-ui, #result-screen { width: 100%; height: 100vh; display: none; flex-direction: column; }
        header { background: #004085; color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .timer-box { background: #fff; color: #d9534f; padding: 5px 15px; border-radius: 4px; font-weight: bold; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        .question-section { flex: 3; background: white; display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #ccc; position: relative; }
        .subject-bar { background: #e9ecef; padding: 10px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
        #q-content { flex: 1; overflow-y: auto; }
        .q-img { max-width: 100%; border: 1px solid #ddd; margin: 10px 0; display: block; border-radius: 4px; }

        .option-card { padding: 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; display: flex; align-items: center; margin-bottom: 10px; transition: 0.3s; }
        .option-card.correct { background: #d4edda !important; border-color: #28a745 !important; font-weight: bold; }
        .option-card.wrong { background: #f8d7da !important; border-color: #dc3545 !important; }

        .side-panel { flex: 1; background: #f8f9fa; display: flex; flex-direction: column; padding: 15px; min-width: 320px; }
        .nav-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 8px 2px; text-align: center; background: #ddd; cursor: pointer; font-size: 0.75rem; border-radius: 3px; font-weight: bold; }
        .tab.active { background: #007bff; color: white; }

        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; overflow-y: auto; max-height: 350px; padding: 5px; }
        .q-num { height: 35px; border: 1px solid #ccc; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .q-num.active { border: 2px solid #000; font-weight: bold; }
        .q-num.answered { background: #28a745; color: white; }
        .q-num.marked { background: #6f42c1; color: white; }
        .q-num.sol-correct { background: #28a745 !important; color: white; border: none; }
        .q-num.sol-wrong { background: #dc3545 !important; color: white; border: none; }
        .q-num.sol-skipped { background: #adb5bd !important; color: white; border: none; }

        .sol-footer { background: #f8f9fa; border-top: 3px solid #004085; padding: 15px; font-size: 1rem; display: none; line-height: 1.6; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #004085; color: white; }
        .btn-red { background: #dc3545; color: white; }
        
        #result-screen { align-items: center; background: #f4f7f6; overflow-y: auto; padding: 40px 20px; }
        .total-marks { font-size: 4rem; font-weight: 900; color: #004085; margin-bottom: 10px; }
        .sub-report-card { background: white; width: 100%; max-width: 800px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .sub-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="instruction-page" style="display: flex; align-items: center; justify-content: center;">
    <div style="max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center;">
        <h2 style="color:#004085">BITSAT Mock Test 1</h2>
        <p>130 Questions | 180 Minutes | +3, -1 Marking</p>
        <div style="display:flex; gap:10px; justify-content: center; margin-top:20px;">
            <button class="btn btn-blue" onclick="startExam()">I am ready to begin</button>
            <button class="btn btn-red" onclick="resetData()">Reset Progress</button>
        </div>
    </div>
</div>

<div id="exam-ui">
    <header>
        <div id="ui-title" style="font-weight:bold">BITSAT Online Portal</div>
        <div class="timer-box" id="timer">180:00</div>
    </header>
    <div class="main-content">
        <div class="question-section">
            <div class="subject-bar" id="sub-title">Physics</div>
            <div id="q-content">
                <div id="q-label" style="font-weight: bold; margin-bottom:10px">Question 1</div>
                <div id="img-container"></div>
                <div class="options-grid" id="opt-container">
                    <label class="option-card"><input type="radio" name="ans" value="A"> (A)</label>
                    <label class="option-card"><input type="radio" name="ans" value="B"> (B)</label>
                    <label class="option-card"><input type="radio" name="ans" value="C"> (C)</label>
                    <label class="option-card"><input type="radio" name="ans" value="D"> (D)</label>
                </div>
            </div>
            <div class="sol-footer" id="sol-footer"></div>
            <div class="action-footer" id="action-footer" style="padding-top:15px; border-top:1px solid #eee; display:flex; gap:10px;">
                <button class="btn" style="background:#ffc107" onclick="mark()">Mark & Next</button>
                <button class="btn btn-red" onclick="clearAns()">Clear</button>
                <button class="btn" style="background:#28a745; color:white;" onclick="saveNext()">Save & Next</button>
            </div>
        </div>
        <div class="side-panel">
            <div class="nav-tabs">
                <div class="tab" id="tab-Physics" onclick="jumpSub('Physics')">Physics</div>
                <div class="tab" id="tab-Chemistry" onclick="jumpSub('Chemistry')">Chemistry</div>
                <div class="tab" id="tab-Mathematics" onclick="jumpSub('Mathematics')">Maths</div>
                <div class="tab" id="tab-EnglishLR" onclick="jumpSub('English & LR')">Eng & LR</div>
            </div>
            <div id="palette" class="palette"></div>
            <button class="btn btn-blue" style="margin-top:auto" id="submit-btn" onclick="submit()">Submit Test</button>
            <button class="btn btn-red" style="margin-top:10px; display:none;" id="exit-sol" onclick="location.reload()">Exit Analysis</button>
        </div>
    </div>
</div>

<div id="result-screen">
    <h1 style="color:#555">Analysis Result</h1>
    <div class="total-marks" id="res-score">0</div>
    <div class="sub-report-card">
        <h3 style="margin-top:0">Subject-wise Breakdown</h3>
        <div id="sub-breakdown-list"></div>
    </div>
    <div style="display:flex; gap:15px; margin-top:30px;">
        <button class="btn btn-blue" onclick="enterSolutionMode()">View Solutions & Time Analysis</button>
        <button class="btn btn-red" onclick="resetData()">Retake Test</button>
    </div>
</div>

<script>
    const keys = {1:"B",2:"C",3:"C",4:"D",5:"D",6:"A",7:"D",8:"D",9:"D",10:"C",11:"C",12:"D",13:"A",14:"A",15:"A",16:"D",17:"A",18:"D",19:"A",20:"B",21:"A",22:"C",23:"B",24:"B",25:"D",26:"D",27:"A",28:"C",29:"D",30:"C",31:"C",32:"A",33:"A",34:"B",35:"D",36:"A",37:"C",38:"B",39:"C",40:"C",41:"A",42:"C",43:"B",44:"A",45:"B",46:"B",47:"A",48:"A",49:"C",50:"A",51:"D",52:"D",53:"B",54:"A",55:"C",56:"D",57:"A",58:"B",59:"B",60:"D",61:"D",62:"C",63:"B",64:"C",65:"C",66:"B",67:"D",68:"B",69:"B",70:"A",71:"B",72:"B",73:"C",74:"C",75:"B",76:"B",77:"B",78:"B",79:"B",80:"D",81:"C",82:"C",83:"B",84:"D",85:"A",86:"D",87:"C",88:"C",89:"B",90:"D",91:"A",92:"B",93:"A",94:"C",95:"A",96: "C",97:"D",98:"A",99:"A",100:"B",101:"C",102:"D",103:"D",104:"C",105:"D",106:"B",107:"D",108:"A",109:"B",110:"B",111:"A",112:"D",113:"A",114:"A",115:"B",116:"A",117:"C",118:"B",119:"D",120:"D",121:"C",122:"C",123:"A",124:"B",125:"C",126:"C",127:"B",128:"B",129:"C",130:"A"};
    const subs = {"Physics":[1,30],"Chemistry":[31,60],"Mathematics":[61,100],"English & LR":[101,130]};
    const dualImgs = [3, 8, 18, 21, 127];

    let current = 1, currentSub = "Physics", userAns = {}, status = {}, timeTaken = {}, examTime = 180*60;
    let lastTime = Date.now(), isSolutionMode = false, timerInterval;

    function loadSavedData() {
        if(localStorage.getItem('bitsat_ans')) {
            userAns = JSON.parse(localStorage.getItem('bitsat_ans'));
            status = JSON.parse(localStorage.getItem('bitsat_status'));
            timeTaken = JSON.parse(localStorage.getItem('bitsat_time')) || {};
        }
        
        if(localStorage.getItem('bitsat_submitted') === 'true') {
            displayResultLogic(); 
        } else {
            document.getElementById('instruction-page').style.display = 'flex';
        }
    }

    function startExam() {
        document.getElementById('instruction-page').style.display = 'none';
        document.getElementById('exam-ui').style.display = 'flex';
        render(); 
        timerInterval = setInterval(updateClock, 1000);
    }

    function updateClock() {
        if(!isSolutionMode) {
            examTime--;
            let now = Date.now();
            let diff = Math.floor((now - lastTime)/1000);
            timeTaken[current] = (timeTaken[current] || 0) + diff;
            lastTime = now;
            let m=Math.floor(examTime/60), s=examTime%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(examTime<=0) submit();
            sync();
        }
    }

    function render() {
        document.getElementById('sub-title').innerText = currentSub;
        document.getElementById('q-label').innerText = "Question " + current;
        const imgCont = document.getElementById('img-container');
        imgCont.innerHTML = dualImgs.includes(current) ? 
            `<img src="questions/${current}.1.png" class="q-img"><img src="questions/${current}.2.png" class="q-img">` :
            `<img src="questions/${current}.png" class="q-img">`;

        let rds = document.getElementsByName('ans');
        rds.forEach(r => {
            r.checked = (userAns[current] === r.value);
            r.disabled = isSolutionMode;
            let card = r.parentElement;
            card.className = "option-card";
            if(isSolutionMode) {
                if(r.value === keys[current]) card.classList.add('correct');
                else if(userAns[current] === r.value) card.classList.add('wrong');
            }
        });
        if(isSolutionMode) showSolInfo();
        updatePalette();
        updateTabs();
    }

    function updateTabs() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const tabId = currentSub === "Mathematics" ? "tab-Mathematics" : (currentSub === "English & LR" ? "tab-EnglishLR" : "tab-" + currentSub);
        const activeTab = document.getElementById(tabId);
        if(activeTab) activeTab.classList.add('active');
    }

    function showSolInfo() {
        const footer = document.getElementById('sol-footer');
        footer.style.display = 'block';
        let u = userAns[current] || "Skipped";
        let k = keys[current];
        let t = timeTaken[current] || 0;
        let m = u === "Skipped" ? 0 : (u === k ? "+3" : "-1");
        footer.innerHTML = `<b>Solution:</b> Correct [${k}] | <b>Marked:</b> [${u}] | <b>Time:</b> ${t}s | <b>Marks:</b> ${m}`;
    }

    function saveNext() {
        if(!isSolutionMode) {
            let sel = document.querySelector('input[name="ans"]:checked');
            if(sel) { userAns[current] = sel.value; status[current] = 'answered'; }
            sync();
        }
        if(current < 130) { current++; checkSub(); render(); }
    }

    function checkSub() {
        for(let s in subs) { if(current >= subs[s][0] && current <= subs[s][1]) { currentSub = s; break; } }
    }

    function sync() {
        localStorage.setItem('bitsat_ans', JSON.stringify(userAns));
        localStorage.setItem('bitsat_status', JSON.stringify(status));
        localStorage.setItem('bitsat_time', JSON.stringify(timeTaken));
    }

    function updatePalette() {
        let p = document.getElementById('palette'); p.innerHTML = '';
        let range = subs[currentSub];
        for(let i=range[0]; i<=range[1]; i++) {
            let d = document.createElement('div');
            d.className = `q-num ${i===current?'active':''} ${status[i]||''}`;
            if(isSolutionMode) {
                if(!userAns[i]) d.className += " sol-skipped";
                else if(userAns[i] === keys[i]) d.className += " sol-correct";
                else d.className += " sol-wrong";
            }
            d.innerText = i; d.onclick = () => { current=i; checkSub(); render(); };
            p.appendChild(d);
        }
    }

    function submit() {
        if(!confirm("Are you sure?")) return;
        clearInterval(timerInterval);
        localStorage.setItem('bitsat_submitted', 'true');
        displayResultLogic();
    }

    function displayResultLogic() {
        let total = 0, subReports = {};
        for(let s in subs) subReports[s] = {c:0, w:0};

        for(let i=1; i<=130; i++) {
            let s = Object.keys(subs).find(key => i >= subs[key][0] && i <= subs[key][1]);
            if(userAns[i]) {
                if(userAns[i] === keys[i]) { total += 3; subReports[s].c++; }
                else { total -= 1; subReports[s].w++; }
            }
        }
        document.getElementById('exam-ui').style.display='none';
        document.getElementById('instruction-page').style.display = 'none';
        document.getElementById('result-screen').style.display='flex';
        document.getElementById('res-score').innerText = total;

        let breakdownHtml = '';
        for(let s in subReports) {
            let sc = (subReports[s].c * 3) - subReports[s].w;
            breakdownHtml += `<div class="sub-row"><b>${s}</b><span>C: ${subReports[s].c} | W: ${subReports[s].w} | Score: <b>${sc}</b></span></div>`;
        }
        document.getElementById('sub-breakdown-list').innerHTML = breakdownHtml;
    }

    function enterSolutionMode() {
        isSolutionMode = true;
        document.getElementById('result-screen').style.display='none';
        document.getElementById('exam-ui').style.display='flex';
        document.getElementById('action-footer').style.display='none';
        document.getElementById('submit-btn').style.display='none';
        document.getElementById('exit-sol').style.display='block';
        document.getElementById('ui-title').innerText = "Analysis Mode";
        current = 1; checkSub(); render();
    }

    function resetData() {
        if(confirm("Everything will be cleared! Continue?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function clearAns() { document.getElementsByName('ans').forEach(r => r.checked = false); delete userAns[current]; delete status[current]; sync(); updatePalette(); }
    function mark() { let sel = document.querySelector('input[name="ans"]:checked'); if(sel) userAns[current] = sel.value; status[current] = 'marked'; sync(); saveNext(); }
    function jumpSub(s) { currentSub = s; current = subs[s][0]; render(); }

    loadSavedData();
</script>
</body>
</html>
